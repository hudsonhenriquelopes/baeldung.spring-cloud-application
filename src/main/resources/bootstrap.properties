# Sets the configuration name that this application requests from the Spring Cloud Config Server.
spring.cloud.config.name=discovery

# Defines the URL of the Spring Cloud Config Server used to load external configuration.
spring.cloud.config.uri=http://localhost:8081
#------------------------

spring.cloud.config.label=master

# Fails startup instead of silently using Eureka defaults when Config Server is unavailable.
spring.cloud.config.fail-fast=true
