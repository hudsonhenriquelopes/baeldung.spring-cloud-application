# Sets the Spring application name used to identify this service in logs and service discovery.
spring.application.name=discovery

# Configures the embedded web server to listen on port 8082.
server.port=8082

# Sets the hostname that this Eureka instance advertises to clients.
eureka.instance.hostname=localhost
# Defines the Eureka server URL that clients use as the default service registry endpoint.
eureka.client.serviceUrl.defaultZone=http://localhost:8082/eureka/
# Prevents this Eureka server from registering itself as a client in the registry.
eureka.client.register-with-eureka=false
# Prevents this Eureka server from fetching registry data from another Eureka server.
eureka.client.fetch-registry=false